<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src = "javascript.js" defer></script>
    <link rel = "stylesheet" href = "styles.css">
</head>
<body>
    <div id = "winAlert"></div>
    <div id = playerNames> 
        <div id = "playerOne" class="playerNameDiv">
            <input type="text" id = "playerOneName" class="playerNameBox" maxlength = "30" value = "Player 1"/>    
        </div>
        <div> - X</div>

        </div>
        <div> - 0</div>
    </div>
        
    <div id = "gameboard">
        <div class="cell"></div>

        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
    </div>
    <button id = "restartButton">Restart</button>
</body>
</html>
