<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src = "javascript.js" defer></script>
    <link rel = "stylesheet" href = "styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>
    <div id = "winAlert">
        <div id = "winner"></div>
        <div id = "winnerName"></div>
    </div>
    <div id = playerNames> 
        <div id = "playerOne" class="playerNameDiv">
            <input type="text" id = "playerOneName" class="playerNameBox" maxlength = "30" value = "Player 1"/>    
            <div class = "marker" id = "xMarker">(X)</div>
        </div>
        <div id = "playerTwo" class="playerNameDiv">
            <input type = "text" id = "playerTwoName" class="playerNameBox" contenteditable="true" value = "Player 2"/>
            <div class="marker" id = "oMarker">(O)</div>
        </div>
    </div>
        
    <div id = "gameboard">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
    </div>
    <button id = "restartButton">Play Again</button>
</body>
</html>
