<html lang="en">
<head>

</head>
<body>
    <div id = "winAlert"></div>
    <div id = playerNames> 
        <div id = "playerOne" contenteditable="true" class="playerNameDiv">

                Player One
            </span>    
             <img  class = "pencilIcon" src = "icons/pencil.svg"></img> 
        </div>
        <div> - X</div>
        <div id = "playerTwo" contenteditable="true" class="playerNameDiv">

            </span>
            <img  class = "pencilIcon" src = "icons/pencil.svg"></img>
        </div>
        <div> - 0</div>
    </div>
        
    <div id = "gameboard">
        <div class="cell"></div>

        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>

</html>
